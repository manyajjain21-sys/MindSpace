<!DOCTYPE html>
<html>
<head>
<title>MindSpace</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #f5f1ea, #e8dccb, #d6e5d8);
}

/* HERO */
.hero {
    width: 85%;
    margin: 30px auto;
    background: white;
    padding: 20px;
    border-radius: 20px;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* DARK BUTTON */
.dark-toggle {
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
}

/* NAV STRIP */
.nav-strip {
    background: #a67c52;
    display: flex;
    justify-content: space-around;
    padding: 12px;
    border-radius: 12px;
    margin-top: 10px;
}

.nav-item {
    color: white;
    cursor: pointer;
}

/* SECTIONS */
.section {
    width: 85%;
    margin: 25px auto;
    padding: 25px;
    border-radius: 18px;
}

/* COLORS */
#ideas { background: #fff3cd; }
#goals { background: #d0e8ff; }
#learning { background: #d3f0d7; }
#gratitude { background: #f9d6d5; }
#tasks { background: #e0e0e0; }
#mind { background: #d1c4e9; }

/* INPUT */
input {
    padding: 10px;
    width: 60%;
    border-radius: 10px;
    border: none;
}

/* BUTTON */
button {
    padding: 8px 14px;
    border: none;
    border-radius: 10px;
    background: #333;
    color: white;
    cursor: pointer;
}

/* CARDS */
.cards {
    margin-top: 15px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* LEFT SIDE (checkbox + text) */
.left {
    display: flex;
    align-items: center;
    gap: 10px;
}

/* DELETE BUTTON */
.delete {
    background: #e8f5e9;
    color: green;
    padding: 4px 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
}

/* PROGRESS */
.progress {
    margin-top: 10px;
    background: #ccc;
    border-radius: 10px;
}

.progress-bar {
    height: 10px;
    background: green;
    width: 0%;
}

/* STREAK */
.streak {
    margin-top: 10px;
    font-weight: bold;
}

/* DARK MODE */
.dark {
    background: #121212;
    color: white;
}

.dark .hero,
.dark .section {
    background: #2a2a2a;
}

.dark .card {
    background: #333;
}

.dark input {
    background: #333;
    color: white;
}

/* NAV HOVER EFFECT */
.nav-item {
    transition: 0.3s;
}

.nav-item:hover {
    background: #8c6844;
    padding: 6px 10px;
    border-radius: 8px;
    transform: translateY(-2px);
}

/* HERO CARD (MindSpace box) HOVER */
.hero {
    transition: 0.3s;
}

.hero:hover {
    transform: translateY(-5px) scale(1.01);
    box-shadow: 0 25px 60px rgba(0,0,0,0.15);
}

/* SECTION HOVER */
.section {
    transition: 0.3s;
}

.section:hover {
    transform: translateY(-4px);
    box-shadow: 0 15px 35px rgba(0,0,0,0.12);
}

/* CARD HOVER */
.card {
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.02);
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

/* DELETE BUTTON HOVER */
.delete {
    transition: 0.2s;
}

.delete:hover {
    background: green;
    color: white;
    transform: scale(1.05);
}

/* BUTTON HOVER */
button {
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
    background: #555;
}

/* INPUT HOVER */
input {
    transition: 0.2s;
}

input:focus {
    outline: 2px solid #a67c52;
}

</style>
</head>

<body>

<div class="hero">
    <div class="header">
        <h1>🌿 MindSpace</h1>
        <button class="dark-toggle" onclick="toggleDark()">🌙</button>
    </div>

    <div class="nav-strip">
        <div class="nav-item" onclick="go('ideas')">Ideas</div>
        <div class="nav-item" onclick="go('goals')">Goals</div>
        <div class="nav-item" onclick="go('learning')">Learning</div>
        <div class="nav-item" onclick="go('gratitude')">Gratitude</div>
        <div class="nav-item" onclick="go('tasks')">Tasks</div>
        <div class="nav-item" onclick="go('mind')">Mind</div>
    </div>
</div>

<!-- ALL SECTIONS -->

<div class="section" id="ideas">
<h2>💡 Ideas</h2>
<input id="ideasInput"><button onclick="addItem('ideas')">Add</button>
<div class="cards" id="ideasList"></div>
</div>

<div class="section" id="goals">
<h2>🎯 Goals</h2>
<input id="goalsInput"><button onclick="addItem('goals',true)">Add</button>
<div class="cards" id="goalsList"></div>

<div class="progress"><div class="progress-bar" id="progressBar"></div></div>
<p id="progressText">0 / 0 completed</p>
</div>

<div class="section" id="learning">
<h2>📘 Learning</h2>
<input id="learningInput"><button onclick="addItem('learning')">Add</button>
<div class="cards" id="learningList"></div>
</div>

<div class="section" id="gratitude">
<h2>❤️ Gratitude</h2>
<input id="gratitudeInput"><button onclick="addItem('gratitude')">Add</button>
<div class="cards" id="gratitudeList"></div>
</div>

<div class="section" id="tasks">
<h2>✅ Tasks</h2>
<input id="tasksInput"><button onclick="addItem('tasks',true)">Add</button>
<div class="cards" id="tasksList"></div>

<div class="streak">🔥 Streak: <span id="streak">0</span> days</div>
</div>

<div class="section" id="mind">
<h2>🧠 Mind Dump</h2>
<input id="mindInput"><button onclick="addItem('mind')">Add</button>
<div class="cards" id="mindList"></div>
</div>

<script>

// NAV
function go(id){
    document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

// DARK MODE
function toggleDark(){
    document.body.classList.toggle("dark");
    localStorage.setItem("theme", document.body.classList.contains("dark")?"dark":"light");
}

// LOAD
window.onload=function(){
    if(localStorage.getItem("theme")==="dark") document.body.classList.add("dark");

    ["ideas","goals","learning","gratitude","tasks","mind"].forEach(loadData);
    updateProgress();
}

// ADD
function addItem(type,checkbox=false){
    let input=document.getElementById(type+"Input");
    if(input.value==="") return;

    createCard(type,input.value,checkbox);
    saveData(type,input.value);

    input.value="";
}

// CREATE CARD
function createCard(type,text,checkbox=false){
    let list=document.getElementById(type+"List");

    let div=document.createElement("div");
    div.className="card";

    let left=document.createElement("div");
    left.className="left";

    if(checkbox){
        let cb=document.createElement("input");
        cb.type="checkbox";
        cb.onchange=updateProgress;
        left.appendChild(cb);
    }

    let span=document.createElement("span");
    span.innerText=text;
    left.appendChild(span);

    let del=document.createElement("span");
    del.className="delete";
    del.innerText="Remove";
    del.onclick=function(){
        div.remove();
        deleteData(type,text);
        updateProgress();
    };

    div.appendChild(left);
    div.appendChild(del);

    list.appendChild(div);
}

// SAVE
function saveData(type,text){
    let data=JSON.parse(localStorage.getItem(type))||[];
    data.push(text);
    localStorage.setItem(type,JSON.stringify(data));
}

// DELETE
function deleteData(type,text){
    let data=JSON.parse(localStorage.getItem(type))||[];
    data=data.filter(x=>x!==text);
    localStorage.setItem(type,JSON.stringify(data));
}

// LOAD
function loadData(type){
    let data=JSON.parse(localStorage.getItem(type))||[];
    data.forEach(text=>{
        createCard(type,text,(type==="tasks"||type==="goals"));
    });
}

// PROGRESS + STREAK
function updateProgress(){
    let all=document.querySelectorAll("#tasks input[type=checkbox], #goals input[type=checkbox]");
    let total=all.length, done=0;

    all.forEach(c=>{if(c.checked) done++;});

    let percent=total? (done/total)*100:0;
    document.getElementById("progressBar").style.width=percent+"%";
    document.getElementById("progressText").innerText=done+" / "+total+" completed";

    if(total>0 && done===total){
        let streak=parseInt(localStorage.getItem("streak")||0)+1;
        localStorage.setItem("streak",streak);
        document.getElementById("streak").innerText=streak;
    } else {
        document.getElementById("streak").innerText=localStorage.getItem("streak")||0;
    }
}

</script>

</body>
</html>
